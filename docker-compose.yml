#  watchR.ai — Docker Compose
#  docker compose up --build

x-backend-base: &backend-base
  build:
    context: ./backend
  env_file: .env 
  volumes: 
    - ./backend:/app
    - chroma_data:/data/chroma
  depends_on:
    redis:
      condition: service_healthy
    mongo:
      condition: service_healthy
  networks: [watchr]
  restart: unless-stopped

services:

  # ── FastAPI ──
  api:
    <<: *backend-base
    ports: ["8000:8000"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Celery Worker ──
  worker:
    <<: *backend-base
    command: >
      celery -A app.celery_app worker
      --loglevel=info
      --concurrency=2
      -Q scraping,embedding,default
    healthcheck:
      test: ["CMD", "celery", "-A", "app.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Redis ──
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: [redis_data:/data]
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [watchr]
    restart: unless-stopped

  # ── MongoDB ──
  mongo:
    image: mongo:7
    ports: ["27017:27017"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: watchr_db
    volumes:
      - mongo_data:/data/db
      - ./infra/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [watchr]
    restart: unless-stopped

volumes:
  redis_data:
  mongo_data:
  chroma_data:

networks:
  watchr:
    driver: bridge
